server:
  port: 8080

spring:
  application:
    name: agenda_facil

  datasource:
    url: jdbc:mysql://localhost:3306/db_agendafacil?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true